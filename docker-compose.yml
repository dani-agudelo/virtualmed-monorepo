# VirtualMed — stack local con Docker Compose

name: virtualmed

services:
  # ── PostgreSQL local (opcional; por defecto se usa Render vía POSTGRES_CONNECTION) ──
  # postgres:
  #   image: postgres:16-alpine
  #   container_name: virtualmed-postgres
  #   environment:
  #     POSTGRES_DB: virtualmed
  #     POSTGRES_USER: virtualmed
  #     POSTGRES_PASSWORD: virtualmed123
  #   ports:
  #     - "5432:5432"
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U virtualmed -d virtualmed"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: virtualmed-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-virtualmed}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-VirtualMed123}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9000/minio/health/live || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  chatbot:
    build:
      context: ./chatbot-virtualmed
      dockerfile: Dockerfile
    container_name: virtualmed-chatbot
    ports:
      - "8000:8000"  
    env_file:
      - .env
    environment:
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-virtualmed-internal-dev-key}
    volumes:
      - ./chatbot-virtualmed/data:/app/data
      - ./chatbot-virtualmed/chroma_db:/app/chroma_db
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 3
    restart: unless-stopped

  risk-prediction:
    build:
      context: ./virtualmed-risk-prediction
      dockerfile: Dockerfile
    container_name: virtualmed-risk
    ports:
      - "8001:8000"  
    environment:
      MODEL_DIR: /app/models
      MODEL_VERSION: v1
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    restart: unless-stopped

  backend:
    build:
      context: ./VirtualMedBackend
      dockerfile: Dockerfile
    container_name: virtualmed-backend
    ports:
      - "5045:8080"
    env_file:
      - .env
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: ${POSTGRES_CONNECTION}
      Jwt__Key: ${JWT_KEY}
      Encryption__Key: ${ENCRYPTION_KEY:-}
      Minio__Endpoint: ${MINIO_ENDPOINT:-minio:9000}
      Minio__AccessKey: ${MINIO_ACCESS_KEY:-virtualmed}
      Minio__SecretKey: ${MINIO_SECRET_KEY:-VirtualMed123}
      Minio__Bucket: ${MINIO_BUCKET:-doctor-documents}
      Minio__UseSsl: ${MINIO_USE_SSL:-false}
      Twilio__AccountSid: ${TWILIO_ACCOUNT_SID:-}
      Twilio__ApiKeySid: ${TWILIO_API_KEY_SID:-}
      Twilio__ApiKeySecret: ${TWILIO_API_KEY_SECRET:-}
      Email__Enabled: ${EMAIL_ENABLED:-false}
      Email__FromEmail: ${EMAIL_FROM:-}
      Email__FromName: ${EMAIL_FROM_NAME:-VirtualMed}
      Email__EmailApiKey: ${EMAIL_API_KEY:-}
      Email__FrontendBaseUrl: ${EMAIL_FRONTEND_BASE_URL:-http://localhost:3000}
      Email__AdminNotificationEmail: ${EMAIL_ADMIN_NOTIFICATION:-}
      RiskPrediction__BaseUrl: http://risk-prediction:8000
      IpRateLimiting__EnableEndpointRateLimiting: "false"
      ClientRateLimiting__EnableEndpointRateLimiting: "false"
    depends_on:
      minio:
        condition: service_started
      risk-prediction:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./VirtualMed_Frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:5045/api}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:5045/hubs/video-chat}
        NEXT_PUBLIC_AI_URL: ${NEXT_PUBLIC_AI_URL:-http://localhost:8000}
        NEXT_PUBLIC_CHATBOT_INTERNAL_API_KEY: ${NEXT_PUBLIC_CHATBOT_INTERNAL_API_KEY:-virtualmed-internal-dev-key}
    container_name: virtualmed-frontend
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_started
      chatbot:
        condition: service_healthy
    restart: unless-stopped

# volumes:
#   postgres_data:
volumes:
  minio_data:
